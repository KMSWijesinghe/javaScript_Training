<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sameera</title>
</head>
<style>
    body{
            text-align: center ;
    }

</style>

<body>
    <h1 class="my-title">My Title</h1>
    <h2 class = "my-number">1500</h2>

    <script>
       var number = document.querySelector(".my-number");
       var title = document.querySelector(".my-title");
       //console.log(number);

       var count = 1;
        setInterval(() => {

            if(count < 1500){
            count++;
            number.innerHTML = count;
            }

        }, 1);

        setTimeout(() => {
            title.innerHTML = "Time is Up";
        }, 2000);

    </script>


</body>
</html>
